<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>M-PESA Toolkit - Calc & Reversal</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<style>
:root{--bg:#0A0A0A;--card:#181818;--chip:#222;--text:#fff;--muted:#888;--border:#2a2a2a}
.light{--bg:#f2f2f2;--card:#fff;--chip:#eee;--text:#000;--muted:#666;--border:#ddd}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui;transition:.2s}
.top{display:flex;justify-content:space-between;align-items:center;background:#00B140;padding:12px 16px;position:sticky;top:0}
.top h1{margin:0;font-size:18px;color:#000;font-weight:900}
.icons{display:flex;gap:8px}.ico{width:36px;height:36px;border-radius:10px;background:rgba(0,0,0,.15);display:grid;place-items:center;font-weight:900;color:#000;cursor:pointer}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin:10px 12px}
.title{font-weight:900;font-size:13px;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.switch{display:flex;background:var(--chip);border-radius:11px;padding:3px}
.sw{flex:1;padding:9px;text-align:center;border-radius:8px;font-weight:800;font-size:13px;cursor:pointer}
.sw.active{background:#00B140;color:#000}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{border:1px solid var(--border);background:var(--chip);color:var(--text);border-radius:20px;padding:7px 12px;font-weight:700;cursor:pointer;font-size:13px}
.chip.active{background:#fff;color:#000}
.input{width:100%;background:var(--chip);border:2px solid var(--border);color:var(--text);padding:12px;border-radius:12px;font-size:18px;font-weight:800;margin-top:8px;outline:none}
.box{border:1.5px dashed #00B140;border-radius:12px;padding:12px;margin-top:10px;background:linear-gradient(135deg,#0f2012,#181818)}
.row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted)}.big{font-size:20px;font-weight:900;color:#00E676}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-weight:900;font-size:13px;cursor:pointer;margin-top:8px}
.btn-g{background:#00B140;color:#000}.btn-w{background:#fff;color:#000}.btn-o{background:transparent;border:1px solid var(--border);color:var(--text)}
.foot{padding:18px;text-align:center;color:#666;font-size:10px}
</style>
</head>
<body id="body">
<div class="top">
<h1>M-PESA TOOLKIT</h1>
<div class="icons">
<div class="ico" onclick="toggleLang()" id="lb">EN</div>
<div class="ico" onclick="toggleMode()">🌙</div>
</div>
</div>

<div class="card">
<div class="title">⚡ <span id="cTitle">FAST FEE CALC</span> <span style="margin-left:auto;font-size:9px;background:#00B140;color:#000;padding:3px 8px;border-radius:20px">LIVE 2026</span></div>
<div class="switch">
<div class="sw active" id="bS" onclick="setType('send')">📤 SEND</div>
<div class="sw" id="bW" onclick="setType('with')">🏧 WITHDRAW</div>
</div>
<div class="chips">
<button class="chip" onclick="setA(500)">500</button>
<button class="chip active" onclick="setA(1000)">1K</button>
<button class="chip" onclick="setA(2000)">2K</button>
<button class="chip" onclick="setA(5000)">5K</button>
<button class="chip" onclick="setA(10000)">10K</button>
</div>
<input id="amt" class="input" type="number" value="1000" oninput="calc()">
<div class="box">
<div class="row"><span id="lFee">Fee</span><b id="fee" style="color:#ff5252">KES 13</b></div>
<div class="row" style="margin-top:4px"><span id="lGet">Total Cost / You Get</span><b id="net" class="big">KES 1,013</b></div>
</div>
</div>

<div class="card" style="border-color:#00B140">
<div class="title">↩️ M-PESA REVERSAL 456</div>
<input id="rAmt" class="input" type="number" placeholder="Amount wrong sent" oninput="rCalc()">
<div class="row" style="margin-top:8px"><span>Reversal Fee</span><b id="rFee">KES 0</b></div>
<button class="btn btn-g" onclick="doRev()">↩ RUDISHA VIA SMS 456</button>
<button class="btn btn-w" id="actionBtn" onclick="doAction()">📤 SEND via *334#</button>
<button class="btn btn-o" onclick="share()">📤 SHARE TOOLKIT</button>
</div>

<div class="foot">NYANDERE Software Company | com.nyandere.rudishapesa.ke | Katito 0799865160 | V5.1 VIP</div>

<script>
let type='send', lang='en';
const sendFees=[[1,100,0],[101,500,7],[501,1000,13],[1001,1500,23],[1501,2500,33],[2501,3500,53],[3501,5000,73],[5001,7500,83],[7501,10000,112],[10001,15000,159],[15001,20000,176],[20001,35000,199],[35001,50000,302],[50001,70000,330]];
const withFees=[[1,100,0],[101,500,29],[501,1000,29],[1001,1500,29],[1501,2500,29],[2501,3500,52],[3501,5000,69],[5001,7500,87],[7501,10000,115],[10001,15000,167],[15001,20000,185],[20001,35000,200],[35001,50000,300],[50001,70000,330]];
function getFee(a){let t=type=='send'?sendFees:withFees;for(let r of t){if(a>=r[0]&&a<=r[1])return r[2]}return 330}
function calc(){
let a=parseInt(document.getElementById('amt').value)||0;let f=getFee(a);
document.getElementById('fee').textContent='KES '+f;
let net=type=='send'?(a+f):(a-f);
document.getElementById('net').textContent='KES '+net.toLocaleString();
document.getElementById('rAmt').value=a;rCalc();
updateActionBtn();
}
function updateActionBtn(){
let btn=document.getElementById('actionBtn');
if(type=='send'){
btn.textContent= lang=='en'? '📤 SEND via *334#' : '📤 TUMA via *334#';
}else{
btn.textContent= lang=='en'? '🏧 WITHDRAW via Agent' : '🏧 TOA kwa Agent';
}
}
function setA(v){document.getElementById('amt').value=v;calc()}
function setType(t){
type=t;
document.getElementById('bS').classList.toggle('active',t=='send');
document.getElementById('bW').classList.toggle('active',t=='with');
calc();
}
function rCalc(){let a=parseInt(document.getElementById('rAmt').value)||0;document.getElementById('rFee').textContent='KES '+getFee(a)}
function doRev(){let a=document.getElementById('rAmt').value||document.getElementById('amt').value;location.href='sms:456?body=Forward M-PESA KES '+a+' wrong number';}
function doAction(){
if(type=='send'){location.href='tel:*334*1%23';}
else{location.href='tel:*334%23';}
}
function toggleMode(){document.getElementById('body').classList.toggle('light')}
function toggleLang(){
if(lang=='en'){lang='sw';
document.getElementById('lb').textContent='SW';
document.getElementById('bS').textContent='📤 TUMA';
document.getElementById('bW').textContent='🏧 TOA';
}else{lang='en';
document.getElementById('lb').textContent='EN';
document.getElementById('bS').textContent='📤 SEND';
document.getElementById('bW').textContent='🏧 WITHDRAW';
}
updateActionBtn();
}
function share(){if(navigator.share)navigator.share({title:'M-PESA Toolkit VIP',url:location.href});else prompt('Copy:',location.href)}
calc();
</script>
</body>
</html>

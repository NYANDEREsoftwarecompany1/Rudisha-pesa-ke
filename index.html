<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>M-PESA Toolkit - Calc & Reversal</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png">
<meta name="theme-color" content="#0A0A0A">
<style>
:root{--bg:#0A0A0A;--card:#141414;--chip:#1E1E1E;--text:#fff;--muted:#888;--border:#222}
.light{--bg:#f2f2f2;--card:#fff;--chip:#eee;--text:#000;--muted:#666;--border:#ddd}
*{box-sizing:border-box}body{font-family:system-ui,sans-serif;background:var(--bg);margin:0;color:var(--text);transition:.3s}
.top{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#00B140,#00E676);padding:14px 16px}
.top h1{margin:0;font-size:20px;color:#000;font-weight:900;letter-spacing:-1px}
.icons{display:flex;gap:10px}
.ico{width:36px;height:36px;border-radius:10px;background:rgba(0,0,0,.15);display:grid;place-items:center;font-size:18px;cursor:pointer;font-weight:800;color:#000}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;margin:12px}
.label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:800;margin-top:10px}
.switch{display:flex;background:var(--chip);border-radius:12px;padding:4px;margin-top:8px}
.sw{flex:1;padding:10px;text-align:center;border-radius:9px;font-weight:800;cursor:pointer;font-size:13px}
.sw.active{background:#00B140;color:#000}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{border:1px solid var(--border);background:var(--chip);color:var(--text);border-radius:100px;padding:8px 14px;font-weight:700;cursor:pointer}
.chip.active{background:#fff;color:#000}
.input{width:100%;background:var(--chip);border:2px solid var(--border);color:var(--text);padding:14px;border-radius:14px;font-size:20px;font-weight:800;margin-top:8px;outline:none}
.box{background:linear-gradient(135deg,#101F13,#1a1a1a);border:1.5px dashed #00B140;border-radius:14px;padding:14px;margin-top:14px}
.light.box{background:#f0faf2}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-weight:900;font-size:14px;cursor:pointer;margin-top:10px}
.btn-g{background:#00B140;color:#000}.btn-w{background:var(--text);color:var(--bg)}.btn-o{background:transparent;color:var(--text);border:1.5px solid var(--border)}
.foot{padding:20px;text-align:center;color:#777;font-size:11px}
</style>
</head>
<body id="body">
<div class="top">
<h1 id="tTitle">M-PESA TOOLKIT</h1>
<div class="icons">
<div class="ico" onclick="toggleLang()" id="langBtn">EN</div>
<div class="ico" onclick="toggleMode()">🌙</div>
</div>
</div>

<div class="card">
<div class="label" id="lType">Transaction Type</div>
<div class="switch">
<div class="sw active" id="bSend" onclick="setType('send')">📤 SEND</div>
<div class="sw" id="bWith" onclick="setType('with')">🏧 WITHDRAW</div>
</div>

<div class="label" id="lAmt">Amount (KES)</div>
<div class="chips">
<button class="chip" onclick="setA(500)">500</button>
<button class="chip active" onclick="setA(1000)">1K</button>
<button class="chip" onclick="setA(2000)">2K</button>
<button class="chip" onclick="setA(5000)">5K</button>
<button class="chip" onclick="setA(10000)">10K</button>
</div>
<input id="amt" class="input" type="number" value="1000" oninput="calc()">

<div class="box">
<div style="display:flex;justify-content:space-between;color:#888;font-size:13px"><span id="lFee">Fee</span><b id="fee" style="color:#ff5252">KES 13</b></div>
<div style="display:flex;justify-content:space-between;margin-top:6px"><span style="font-weight:800" id="lNet">YOU GET</span><b id="net" style="color:#00E676;font-size:22px">KES 987</b></div>
</div>

<button class="btn btn-g" onclick="rev()" id="bRev">↩ RUDISHA VIA 456</button>
<button class="btn btn-w" onclick="move()" id="bMove">💸 MOVE *334#</button>
<button class="btn btn-o" onclick="share()" id="bShare">📤 SHARE TOOLKIT</button>
</div>

<div class="foot">
<b>NYANDERE Software Company</b><br>
App ID: com.nyandere.rudishapesa.ke | Katito 0799865160<br>
Version 4.0 VIP
</div>

<script>
let type='send', lang='en';
const sendFees=[[1,100,0],[101,500,7],[501,1000,13],[1001,1500,23],[1501,2500,33],[2501,3500,53],[3501,5000,73],[5001,7500,83],[7501,10000,112],[10001,15000,159],[15001,20000,176],[20001,35000,199],[35001,50000,302],[50001,70000,330]];
const withFees=[[1,100,0],[101,500,29],[501,1000,29],[1001,1500,29],[1501,2500,29],[2501,3500,52],[3501,5000,69],[5001,7500,87],[7501,10000,115],[10001,15000,167],[15001,20000,185],[20001,35000,200],[35001,50000,300],[50001,70000,330]];
function getFee(a){let tbl=type=='send'?sendFees:withFees;for(let r of tbl){if(a>=r[0]&&a<=r[1])return r[2]}return 330}
function calc(){let a=parseInt(document.getElementById('amt').value)||0;let f=getFee(a);document.getElementById('fee').textContent='KES '+f;document.getElementById('net').textContent='KES '+(a-f).toLocaleString()}
function setA(v){document.getElementById('amt').value=v;calc()}
function setType(t){type=t;document.getElementById('bSend').classList.toggle('active',t=='send');document.getElementById('bWith').classList.toggle('active',t=='with');calc()}
function toggleMode(){document.getElementById('body').classList.toggle('light')}
function toggleLang(){
if(lang=='en'){lang='sw';
document.getElementById('tTitle').textContent='KIFAA CHA M-PESA';
document.getElementById('lType').textContent='Aina ya Muamala';
document.getElementById('bSend').textContent='📤 TUMA';
document.getElementById('bWith').textContent='🏧 TOA';
document.getElementById('lAmt').textContent='Kiasi (KES)';
document.getElementById('lFee').textContent='Tozo';
document.getElementById('lNet').textContent='UTAPATA';
document.getElementById('bRev').textContent='↩ RUDISHA 456';
document.getElementById('bMove').textContent='💸 HAMISHA *334#';
document.getElementById('langBtn').textContent='SW';
}else{lang='en';
document.getElementById('tTitle').textContent='M-PESA TOOLKIT';
document.getElementById('lType').textContent='Transaction Type';
document.getElementById('bSend').textContent='📤 SEND';
document.getElementById('bWith').textContent='🏧 WITHDRAW';
document.getElementById('lAmt').textContent='Amount (KES)';
document.getElementById('lFee').textContent='Fee';
document.getElementById('lNet').textContent='YOU GET';
document.getElementById('bRev').textContent='↩ RUDISHA VIA 456';
document.getElementById('bMove').textContent='💸 MOVE MONEY *334#';
document.getElementById('langBtn').textContent='EN';
}}
function rev(){let a=document.getElementById('amt').value;location.href='sms:456?body=Forward M-PESA KES '+a+' wrong number';}
function move(){location.href='tel:*334%23';}
function share(){if(navigator.share)navigator.share({title:'M-PESA Toolkit',url:location.href});else prompt('Copy:',location.href)}
calc();
</script>
</body>
</html>
